<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lab Orbit Demo</title>
    <style>
      :root {
        color-scheme: dark;
        --accent: 134 130 255;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        overflow: hidden;
        font-family: "SF Pro Display", "PingFang SC", system-ui, sans-serif;
        background:
          radial-gradient(circle at 24% 20%, rgba(120, 170, 255, 0.38), transparent 18rem),
          radial-gradient(circle at 72% 34%, rgba(164, 126, 255, 0.28), transparent 18rem),
          linear-gradient(180deg, #02050c, #060b15 62%, #050913);
      }

      .demo {
        position: relative;
        width: min(100%, 38rem);
        aspect-ratio: 16 / 10;
        border-radius: 1.5rem;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02)),
          radial-gradient(circle at top right, rgb(var(--accent) / 0.16), transparent 14rem);
        backdrop-filter: blur(24px);
        overflow: hidden;
      }

      .demo::before,
      .demo::after {
        content: "";
        position: absolute;
        inset: 50% auto auto 50%;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        transform: translate(-50%, -50%);
      }

      .demo::before {
        width: 12rem;
        height: 12rem;
      }

      .demo::after {
        width: 18rem;
        height: 18rem;
        opacity: 0.55;
      }

      .core {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 5.5rem;
        height: 5.5rem;
        border-radius: 999px;
        transform: translate(-50%, -50%);
        background: radial-gradient(circle, rgba(255, 255, 255, 0.4), rgb(var(--accent) / 0.18) 58%, transparent 70%);
        box-shadow:
          0 0 42px rgb(var(--accent) / 0.28),
          0 0 120px rgb(var(--accent) / 0.14);
      }

      .satellite {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 1rem;
        height: 1rem;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 0 20px rgb(var(--accent) / 0.38);
        transform-origin: -5.4rem center;
        animation: orbit 6.5s linear infinite;
      }

      .satellite:nth-child(2) {
        animation-duration: 9s;
        animation-direction: reverse;
        transform-origin: -8.6rem center;
      }

      .ui {
        position: absolute;
        inset: auto 1rem 1rem 1rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        padding: 0.8rem 0.95rem;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .ui strong {
        color: rgba(244, 247, 255, 0.94);
        font-size: 0.92rem;
        letter-spacing: 0.02em;
      }

      .ui button {
        border: 0;
        min-width: 5.5rem;
        height: 2.4rem;
        padding: 0 0.9rem;
        border-radius: 999px;
        color: rgba(246, 249, 255, 0.96);
        font-weight: 600;
        background: linear-gradient(180deg, rgb(var(--accent) / 0.88), rgb(var(--accent) / 0.62));
        box-shadow:
          0 0 24px rgb(var(--accent) / 0.26),
          inset 0 1px 0 rgba(255, 255, 255, 0.18);
        cursor: pointer;
      }

      @keyframes orbit {
        from {
          transform: rotate(0deg) translateX(5.4rem);
        }
        to {
          transform: rotate(360deg) translateX(5.4rem);
        }
      }
    </style>
  </head>
  <body>
    <section class="demo">
      <div class="core"></div>
      <div class="satellite"></div>
      <div class="satellite"></div>
      <div class="ui">
        <strong>Singularity Demo</strong>
        <button type="button" id="pulse">Pulse</button>
      </div>
    </section>
    <script>
      const button = document.getElementById("pulse");
      const root = document.documentElement;
      const accents = ["134 130 255", "108 176 255", "168 140 255"];
      let index = 0;

      button?.addEventListener("click", () => {
        index = (index + 1) % accents.length;
        root.style.setProperty("--accent", accents[index]);
      });
    </script>
  </body>
</html>
